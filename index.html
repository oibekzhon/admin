<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — Ob-havo xaritasi</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="login-wall" id="loginWall">
    <span style="font-size:32px;">🛡️</span>
    <h1>Admin Panel</h1>
    <p>Davom etish uchun admin akkauntingiz bilan kiring</p>
    <button class="login-google-btn" id="adminLoginBtn">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google bilan kirish
    </button>
  </div>

  <div id="adminApp" style="display:none;">

    <div class="header">
      <div class="header-left">
        <span class="header-badge">Admin</span>
        <span class="header-title">Foydalanuvchilar boshqaruvi</span>
      </div>
      <div class="header-right">
        <span class="admin-name" id="adminNameEl"></span>
        <button class="logout-btn" id="adminLogoutBtn">Chiqish</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-card-label">Jami foydalanuvchilar</div>
        <div class="stat-card-value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Hozir online</div>
        <div class="stat-card-value online" id="statOnline">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Bloklangan</div>
        <div class="stat-card-value blocked" id="statBlocked">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Nickname o'rnatgan</div>
        <div class="stat-card-value" id="statNickname">—</div>
      </div>
    </div>

    <div class="toolbar">
      <input type="text" class="search-input" id="adminSearch" placeholder="Ism, nickname yoki email bo'yicha qidirish..."/>
      <button class="filter-btn active" data-filter="all">Hammasi</button>
      <button class="filter-btn" data-filter="online">Online</button>
      <button class="filter-btn" data-filter="blocked">Bloklangan</button>
    </div>

    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>Foydalanuvchi</th>
            <th>Nickname</th>
            <th>Joylashuv</th>
            <th>Holat</th>
            <th>Ro'yxatdan o'tgan</th>
            <th>Amal</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <tr class="spinner-row"><td colspan="6">Yuklanmoqda...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <div class="overlay" id="confirmOverlay">
    <div class="confirm-modal">
      <div class="confirm-icon" id="confirmIcon">⛔</div>
      <div class="confirm-title" id="confirmTitle">Hisobni bloklash</div>
      <div class="confirm-desc" id="confirmDesc"></div>
      <div class="confirm-actions">
        <button class="confirm-cancel" id="confirmCancel">Bekor qilish</button>
        <button class="confirm-ok" id="confirmOk">Bloklash</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
